<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A2E50">
  <title>Carrito — Waremarkt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { navy:{DEFAULT:'#0A2E50',deep:'#07213A',light:'#173F69'}, azul:{DEFAULT:'#007BFF',light:'#3E9BFF'}, amber:{DEFAULT:'#FFC107'}, naranja:{DEFAULT:'#FB8F1A'}, carbon:{DEFAULT:'#343A40'}},
      fontFamily:{display:['"Space Grotesk"','system-ui','sans-serif'],body:['"Inter Tight"','system-ui','sans-serif']}
    }}}
  </script>
  <style>
    body{font-family:'Inter Tight',system-ui,sans-serif}
    .btn-primary{background:linear-gradient(135deg,#FFC107 0%,#FB8F1A 100%);transition:transform .2s,box-shadow .2s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 24px -8px rgba(251,143,26,0.5)}
    [x-cloak]{display:none!important}
  </style>
</head>
<body class="bg-gradient-to-b from-navy/[0.03] to-white min-h-screen text-carbon antialiased">

  <header class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16 lg:h-20">
      <a href="index.html" class="flex items-center gap-2.5">
        <img src="assets/images/logo.svg" alt="Waremarkt" class="w-11 h-11 lg:w-12 lg:h-12">
        <div class="leading-tight">
          <div class="font-display font-bold text-navy text-lg lg:text-xl tracking-tight">WARE<span class="text-azul">MARKT</span></div>
          <div data-i18n="header.tagline" class="text-[9px] lg:text-[10px] text-carbon/70 font-semibold tracking-[0.15em] uppercase hidden sm:block">Soluciones logísticas inteligentes</div>
        </div>
      </a>
      <div class="flex items-center gap-3">
        <button data-lang-switch onclick="WMi18n.toggle()" class="text-xs font-bold tracking-wider text-navy hover:text-azul border border-navy/20 hover:border-azul rounded-full w-10 h-10 flex items-center justify-center transition" title="Switch language">EN</button>
        <a href="tienda.html" class="text-sm font-medium text-carbon hover:text-azul transition flex items-center gap-2">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> <span data-i18n="success.continue">Seguir comprando</span>
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10 lg:py-16" x-data="carritoApp()" x-init="load()">
    <h1 data-i18n="cart.h1" class="font-display font-bold text-3xl lg:text-5xl text-navy mb-8">Tu carrito</h1>

    <div x-show="items.length === 0" class="text-center py-20">
      <div class="w-20 h-20 mx-auto rounded-full bg-navy/5 flex items-center justify-center mb-5">
        <i data-lucide="shopping-cart" class="w-8 h-8 text-navy/40"></i>
      </div>
      <h2 data-i18n="cart.empty_title" class="font-display font-bold text-xl text-navy mb-2">Tu carrito está vacío</h2>
      <p data-i18n="cart.empty_desc" class="text-carbon/60 mb-6">Explora el catálogo y añade productos.</p>
      <a href="tienda.html" data-i18n="cart.go_catalog" class="btn-primary inline-flex text-navy-deep font-bold px-8 py-3.5 rounded-full">Ir al catálogo</a>
    </div>

    <div x-show="items.length > 0" x-cloak class="grid lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-4">
        <template x-for="item in items" :key="item.slug">
          <div class="bg-white rounded-2xl border border-navy/10 p-4 lg:p-5 flex gap-4 items-center">
            <div class="w-20 h-20 lg:w-24 lg:h-24 rounded-xl bg-gradient-to-br from-navy/5 to-azul/10 flex items-center justify-center flex-shrink-0 relative overflow-hidden">
              <i :data-lucide="item.icon || 'package'" class="w-10 h-10 text-navy/40"></i>
              <img x-show="item.image_url" :src="cldUrl(item.image_url, { w: 200, crop: 'fill' })" :alt="item.name" loading="lazy" class="absolute inset-0 w-full h-full object-cover" @error="item.image_url = ''">
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs text-carbon/60 uppercase tracking-wider" x-text="item.brand || ''"></div>
              <h3 class="font-display font-bold text-navy truncate" x-text="item.name"></h3>
              <div class="mt-1 font-display font-bold text-navy" x-text="money(item.price_cents)"></div>
            </div>
            <div class="flex items-center border border-navy/10 rounded-full">
              <button @click="setQty(item.slug, item.quantity-1)" class="w-8 h-8 flex items-center justify-center hover:bg-navy/5 rounded-l-full"><i data-lucide="minus" class="w-3 h-3"></i></button>
              <span class="w-8 text-center text-sm font-semibold" x-text="item.quantity"></span>
              <button @click="setQty(item.slug, item.quantity+1)" class="w-8 h-8 flex items-center justify-center hover:bg-navy/5 rounded-r-full"><i data-lucide="plus" class="w-3 h-3"></i></button>
            </div>
            <button @click="remove(item.slug)" data-i18n-aria="cart.remove_aria" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-red-50 text-carbon/40 hover:text-red-500 transition" aria-label="Eliminar">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </template>
      </div>

      <aside class="lg:sticky lg:top-28 h-fit bg-white rounded-2xl border border-navy/10 p-6">
        <h2 data-i18n="cart.summary" class="font-display font-bold text-xl text-navy mb-5">Resumen</h2>
        <div class="space-y-2 text-sm mb-5">
          <div class="flex justify-between"><span data-i18n="cart.subtotal" class="text-carbon/70">Subtotal</span><span class="font-semibold" x-text="money(total)"></span></div>
          <div class="flex justify-between"><span data-i18n="cart.shipping" class="text-carbon/70">Envío</span><span data-i18n="cart.shipping_value" class="text-carbon/60">Calculado al pagar</span></div>
        </div>
        <div class="border-t border-navy/10 pt-4 flex justify-between items-baseline mb-6">
          <span data-i18n="cart.total" class="font-display font-bold text-navy">Total</span>
          <span class="font-display font-bold text-2xl text-navy" x-text="money(total)"></span>
        </div>

        <button @click="payStripe()" :disabled="loading" class="w-full btn-primary text-navy-deep font-bold py-4 rounded-full mb-3 disabled:opacity-50 flex items-center justify-center gap-2">
          <i data-lucide="credit-card" class="w-5 h-5"></i>
          <span x-text="loading ? WMi18n.t('cart.pay_stripe_loading') : WMi18n.t('cart.pay_stripe')"></span>
        </button>

        <div class="grid grid-cols-2 gap-2">
          <button @click="payWhatsApp()" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-full text-sm flex items-center justify-center gap-1.5">
            <i data-lucide="message-circle" class="w-4 h-4"></i> <span data-i18n="cart.pay_wa">WhatsApp</span>
          </button>
          <button @click="payTransfer()" class="bg-navy hover:bg-navy-deep text-white font-semibold py-3 rounded-full text-sm flex items-center justify-center gap-1.5">
            <i data-lucide="landmark" class="w-4 h-4"></i> <span data-i18n="cart.pay_tr">Transferencia</span>
          </button>
        </div>

        <p x-show="error" x-text="error" class="mt-4 text-sm text-red-600 bg-red-50 p-3 rounded-lg"></p>

        <div class="mt-6 pt-5 border-t border-navy/10 text-xs text-carbon/60 space-y-1.5">
          <div class="flex items-center gap-2"><i data-lucide="shield-check" class="w-3.5 h-3.5 text-amber"></i> <span data-i18n="cart.secure">Pago seguro con SSL</span></div>
          <div class="flex items-center gap-2"><i data-lucide="truck" class="w-3.5 h-3.5 text-amber"></i> <span data-i18n="cart.coverage">Envío a US + 19 países LatAm</span></div>
          <div class="flex items-center gap-2"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5 text-amber"></i> <span data-i18n="cart.returns">30 días para devolución</span></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    window.money = WM.money;
    window.carritoApp = () => ({
      items: [], total: 0, loading: false, error: '',
      load() {
        this.refresh();
        window.addEventListener('cart:update', () => this.refresh());
        window.addEventListener('i18n:change', () => this.$nextTick(() => WMi18n.apply()));
        this.$nextTick(() => lucide.createIcons());
      },
      refresh() { this.items = WM.cart.items(); this.total = WM.cart.total(); this.$nextTick(() => { lucide.createIcons(); WMi18n.apply(); }); },
      setQty(slug, q) { WM.cart.setQty(slug, q); },
      remove(slug) { WM.cart.remove(slug); },
      async payStripe() {
        this.loading = true; this.error = '';
        try { await WM.cart.checkoutStripe(); }
        catch (e) { this.error = e.message || 'No se pudo iniciar el checkout. Verifica que el backend esté corriendo y que hayas configurado Stripe en .env'; this.loading = false; }
      },
      payWhatsApp() { WM.cart.checkoutWhatsApp(); },
      payTransfer() { WM.cart.checkoutTransfer(); }
    });

    window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
